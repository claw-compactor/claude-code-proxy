<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Proxy</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #c9d1d9; --text2: #8b949e;
    --green: #3fb950; --yellow: #d29922; --red: #f85149;
    --blue: #58a6ff; --purple: #bc8cff; --cyan: #39d2c0;
    --orange: #d2883e; --opus: #ff7b72; --sonnet: #3fb950; --haiku: #39d2c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'SF Mono', 'Menlo', monospace; font-size: 13px; }

  /* ── Header ── */
  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 14px; font-weight: 600; color: var(--blue); white-space: nowrap; }
  .header .meta { font-size: 11px; color: var(--text2); display: flex; gap: 10px; align-items: center; }
  .header .meta .mode { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; background: rgba(188,140,255,0.15); color: var(--purple); }
  .header .status { display: flex; align-items: center; gap: 6px; margin-left: auto; font-size: 11px; color: var(--text2); }
  .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.ok { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .dot.err { background: var(--red); }
  .in-iframe .header { display: none; }

  /* ── Token Bar ── */
  .tok-bar { display: flex; background: var(--bg2); border-bottom: 1px solid var(--border); }
  .tok-cell { flex: 1; padding: 10px 16px; border-right: 1px solid var(--border); }
  .tok-cell:last-child { border-right: none; }
  .tok-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text2); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
  .tok-label .mdot { width: 5px; height: 5px; border-radius: 50%; }
  .tok-val { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .tok-sub { font-size: 10px; color: var(--text2); }
  .tok-cell.total .tok-val { color: var(--blue); }
  .tok-cell.opus .tok-val { color: var(--opus); }
  .tok-cell.sonnet .tok-val { color: var(--sonnet); }
  .tok-cell.haiku .tok-val { color: var(--haiku); }

  /* ── Live Indicator ── */
  .live-bar { background: linear-gradient(90deg, rgba(210,136,62,0.12) 0%, transparent 100%); border-bottom: 1px solid var(--border); padding: 5px 20px; display: flex; align-items: center; gap: 10px; font-size: 11px; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--orange); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .live-label { color: var(--orange); font-weight: 600; }
  .live-detail { color: var(--text2); }

  /* ── Layout ── */
  .main { padding: 12px 20px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Worker Cards ── */
  .workers-grid { display: flex; gap: 12px; flex-wrap: wrap; }
  .worker-card { flex: 1; min-width: 280px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .worker-card.limited { border-color: var(--red); }
  .wc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .wc-name { font-size: 14px; font-weight: 700; color: var(--blue); }
  .wc-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .wc-status.healthy { background: rgba(63,185,80,0.15); color: var(--green); }
  .wc-status.limited { background: rgba(248,81,73,0.15); color: var(--red); }
  .wc-status.refreshing { background: rgba(210,136,62,0.15); color: var(--orange); }
  .wc-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; }
  .wc-row .k { font-size: 11px; color: var(--text2); }
  .wc-row .v { font-size: 12px; font-weight: 600; }
  .wc-row .v.g { color: var(--green); }
  .wc-row .v.y { color: var(--yellow); }
  .wc-row .v.r { color: var(--red); }
  .wc-row .v.b { color: var(--blue); }
  .wc-divider { border: none; border-top: 1px solid var(--bg3); margin: 6px 0; }
  .bar-sm { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 2px; }
  .bar-sm .fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

  /* ── Two-Column Grid ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

  /* ── Cards ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
  .card h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .card h2 .cnt { font-weight: 400; }
  .metric { display: flex; justify-content: space-between; align-items: baseline; padding: 2px 0; }
  .metric .lbl { color: var(--text2); font-size: 11px; }
  .metric .val { font-weight: 600; font-size: 12px; }
  .sub-hd { font-size: 9px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text2); margin: 8px 0 4px; font-weight: 600; }
  .divider { border: none; border-top: 1px solid var(--bg3); margin: 6px 0; }
  .empty { color: var(--text2); text-align: center; padding: 12px; font-style: italic; font-size: 11px; }

  /* ── Tags ── */
  .tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 500; }
  .tag.stream { background: #1f3a5f; color: var(--blue); }
  .tag.sync { background: #2a1f3f; color: var(--purple); }
  .tag.opus { background: #3b1f1f; color: var(--opus); }
  .tag.sonnet { background: #1f3b2f; color: var(--sonnet); }
  .tag.haiku { background: #1f2f3b; color: var(--haiku); }

  /* ── Charts ── */
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 900px) { .chart-row { grid-template-columns: 1fr; } }
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .chart-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .chart-hd h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); margin: 0; }
  .tab-group { display: flex; gap: 2px; }
  .tab-btn { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; color: var(--text2); font-size: 9px; padding: 1px 6px; cursor: pointer; font-family: inherit; }
  .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .chart-wrap { height: 180px; position: relative; }

  /* ── Error list ── */
  .err-row { display: flex; justify-content: space-between; padding: 2px 0; }
  .err-row .cat { font-size: 11px; color: var(--text2); }
  .err-row .num { font-size: 11px; font-weight: 600; }
  .err-row .num.nz { color: var(--red); }
  .err-row .num.z { color: var(--text2); }

  /* ── Recent errors ── */
  .re { display: flex; gap: 4px; padding: 2px 0; border-bottom: 1px solid var(--bg3); font-size: 10px; align-items: baseline; }
  .re .t { color: var(--text2); flex-shrink: 0; width: 50px; }
  .re .w { color: var(--blue); flex-shrink: 0; width: 22px; font-weight: 600; }
  .re .c { color: var(--red); flex-shrink: 0; width: 75px; font-weight: 500; }
  .re .d { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Rate limit bars ── */
  .rate-section { margin-bottom: 4px; }
  .rate-bar-wrap { margin: 2px 0; }
  .rate-bg { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .rate-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .rate-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--text2); margin-top: 1px; }

  /* ── Live Stream ── */
  .stream-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
  .stream-panel h2 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); padding: 10px 14px 6px; display: flex; align-items: center; gap: 6px; margin: 0; }
  .sse-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--text2); }
  .sse-dot.connected { background: var(--green); animation: pulse 2s infinite; }
  .stream-feeds { max-height: 260px; overflow-y: auto; }
  .stream-item { padding: 6px 14px; border-top: 1px solid var(--bg3); }
  .si-hd { display: flex; gap: 6px; align-items: center; font-size: 11px; margin-bottom: 3px; }
  .si-hd .sid { color: var(--text2); font-size: 10px; }
  .si-hd .stok { color: var(--orange); font-size: 10px; margin-left: auto; }
  .si-body { font-size: 11px; color: var(--text); line-height: 1.4; max-height: 70px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; background: var(--bg); border-radius: 4px; padding: 5px 8px; }
  .cursor { display: inline-block; width: 2px; height: 11px; background: var(--blue); animation: blink 1s steps(1) infinite; vertical-align: text-bottom; margin-left: 1px; }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }

  /* ── Processes Table ── */
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); padding: 4px 5px; border-bottom: 1px solid var(--border); }
  td { padding: 3px 5px; border-bottom: 1px solid var(--bg3); font-size: 11px; }
  .scroll { max-height: 280px; overflow-y: auto; }

  /* ── Event Log ── */
  .ev { display: flex; gap: 4px; padding: 2px 0; border-bottom: 1px solid var(--bg3); font-size: 10px; align-items: baseline; }
  .ev .t { color: var(--text2); flex-shrink: 0; width: 55px; }
  .ev .tp { flex-shrink: 0; width: 56px; font-weight: 500; }
  .ev .tp.request { color: var(--blue); } .ev .tp.complete { color: var(--green); }
  .ev .tp.error { color: var(--red); } .ev .tp.retry { color: var(--yellow); }
  .ev .tp.timeout,.ev .tp.reap { color: var(--red); } .ev .tp.kill { color: var(--opus); }
  .ev .tp.startup { color: var(--green); } .ev .tp.shutdown,.ev .tp.slot_leak { color: var(--yellow); }
  .ev .tp.system_reap { color: var(--purple); }
  .ev .tok { flex-shrink: 0; width: 80px; text-align: right; color: var(--orange); font-size: 9px; }
  .ev .det { color: var(--text2); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ── Collapsible ── */
  details { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; }
  details summary { padding: 8px 14px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); cursor: pointer; list-style: none; display: flex; align-items: center; gap: 6px; }
  details summary::before { content: '▸'; font-size: 10px; transition: transform 0.2s; }
  details[open] summary::before { transform: rotate(90deg); }
  details .inner { padding: 0 14px 12px; }
</style>
</head>
<body>
<script>if (window.self !== window.top) document.body.classList.add('in-iframe');</script>

<!-- Header -->
<div class="header">
  <h1>⚡ Claude Proxy</h1>
  <div class="meta">
    <span id="version">-</span>
    <span class="mode" id="mode-badge">-</span>
    <span id="worker-count">-</span>
  </div>
  <div class="status">
    <span id="refresh-note">loading...</span>
    <span class="dot" id="status-dot"></span>
  </div>
</div>

<!-- Token Bar -->
<div class="tok-bar" id="tok-bar"></div>

<!-- Live -->
<div class="live-bar" id="live-bar" style="display:none">
  <span class="live-dot"></span>
  <span class="live-label" id="live-label"></span>
  <span class="live-detail" id="live-detail"></span>
</div>

<div class="main">
  <!-- Worker Cards -->
  <div class="workers-grid" id="workers-grid"></div>

  <!-- Charts (2 col) -->
  <div class="chart-row">
    <div class="chart-card">
      <div class="chart-hd">
        <h2>Token Usage</h2>
        <div class="tab-group" id="chart-tabs">
          <button class="tab-btn active" data-w="1h">1H</button>
          <button class="tab-btn" data-w="6h">6H</button>
          <button class="tab-btn" data-w="1d">1D</button>
          <button class="tab-btn" data-w="7d">7D</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="tok-chart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-hd">
        <h2>Requests &amp; Errors</h2>
        <div class="tab-group" id="chart-tabs-2">
          <button class="tab-btn active" data-w="1h">1H</button>
          <button class="tab-btn" data-w="6h">6H</button>
          <button class="tab-btn" data-w="1d">1D</button>
          <button class="tab-btn" data-w="7d">7D</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="req-chart"></canvas></div>
    </div>
  </div>

  <!-- Queue + Errors -->
  <div class="grid-2">
    <div class="card">
      <h2>Queue</h2>
      <div id="queue-body"><div class="empty">loading...</div></div>
    </div>
    <div class="card">
      <h2>Errors <span class="cnt" id="err-total"></span></h2>
      <div id="errors-body"><div class="empty">loading...</div></div>
    </div>
  </div>

  <!-- Live Stream + Processes -->
  <div class="grid-2">
    <div class="stream-panel">
      <h2><span class="sse-dot" id="sse-dot"></span> Live Stream</h2>
      <div class="stream-feeds" id="stream-feeds"><div class="empty">waiting for streams...</div></div>
    </div>
    <div class="card">
      <h2>Active Processes</h2>
      <div class="scroll" id="procs-table"><div class="empty">no active processes</div></div>
    </div>
  </div>

  <!-- Event Log (collapsible) -->
  <details>
    <summary>Event Log</summary>
    <div class="inner scroll" style="max-height:250px" id="events-body"></div>
  </details>

  <!-- System Reaper (collapsible) -->
  <details>
    <summary>System Reaper <span class="cnt" id="reaper-count"></span></summary>
    <div class="inner" id="reaper-body"></div>
  </details>
</div>

<script>
const BASE = window.location.origin;
let lastEventId = 0;
let startTime = Date.now();
let currentWindow = '1h';
let tokChart = null, reqChart = null;

// ── Helpers ──
function fmt(ms) {
  if (ms < 1000) return ms + 'ms';
  if (ms < 60000) return (ms / 1000).toFixed(1) + 's';
  if (ms < 3600000) return (ms / 60000).toFixed(1) + 'm';
  return (ms / 3600000).toFixed(1) + 'h';
}
function fmtMs(ms) {
  if (ms >= 3600000) return (ms / 3600000) + 'hr';
  if (ms >= 60000) return (ms / 60000) + 'min';
  return (ms / 1000) + 's';
}
function fmtTok(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return String(n);
}
function pct(n, d) { return d > 0 ? Math.round((n / d) * 100) : 0; }
function barColor(p) { return p < 60 ? 'var(--green)' : p < 85 ? 'var(--yellow)' : 'var(--red)'; }
function modelTag(m) { return `<span class="tag ${m}">${m}</span>`; }
function modeTag(m) { return `<span class="tag ${m}">${m}</span>`; }
function shortTime(iso) { return new Date(iso).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
function chartTime(ts) {
  const d = new Date(ts * 1000);
  if (currentWindow === '7d') return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (currentWindow === '1d') return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
  return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
async function fetchJson(path) { return (await fetch(BASE + path)).json(); }

// ── Charts ──
const chartOpts = {
  responsive: true, maintainAspectRatio: false,
  animation: { duration: 300 },
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { display: true, position: 'top', labels: { boxWidth: 8, padding: 6, color: '#8b949e', font: { size: 9, family: 'SF Mono, Menlo, monospace' } } },
    tooltip: { backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1, titleColor: '#c9d1d9', bodyColor: '#c9d1d9', bodyFont: { family: 'SF Mono, Menlo, monospace', size: 10 } },
  },
  scales: {
    x: { ticks: { color: '#8b949e', font: { size: 8 }, maxTicksLimit: 6 }, grid: { color: '#21262d' } },
    y: { ticks: { color: '#8b949e', font: { size: 8 }, callback: v => fmtTok(v) }, grid: { color: '#21262d' }, beginAtZero: true },
  },
};

function initCharts() {
  tokChart = new Chart(document.getElementById('tok-chart').getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [
      { label: 'Total', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.08)', fill: true, tension: 0.3, borderWidth: 1.5, pointRadius: 0 },
      { label: 'Input', data: [], borderColor: '#3fb950', borderDash: [4,2], tension: 0.3, borderWidth: 1, pointRadius: 0 },
      { label: 'Output', data: [], borderColor: '#d2883e', borderDash: [4,2], tension: 0.3, borderWidth: 1, pointRadius: 0 },
    ]},
    options: { ...chartOpts },
  });
  reqChart = new Chart(document.getElementById('req-chart').getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [
      { label: 'Completed', data: [], borderColor: '#3fb950', backgroundColor: 'rgba(63,185,80,0.08)', fill: true, tension: 0.3, borderWidth: 1.5, pointRadius: 0 },
      { label: 'Errors', data: [], borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,0.06)', fill: true, tension: 0.3, borderWidth: 1.5, pointRadius: 0 },
    ]},
    options: { ...chartOpts, scales: { ...chartOpts.scales, y: { ...chartOpts.scales.y, ticks: { ...chartOpts.scales.y.ticks, callback: v => String(v) } } } },
  });
}

function updateCharts(points) {
  if (!tokChart || !reqChart || !points || points.length === 0) return;
  const labels = points.map(p => chartTime(p.ts));
  function deltas(arr) { return arr.map((v, i) => i === 0 ? 0 : Math.max(0, v - arr[i - 1])); }
  tokChart.data.labels = labels;
  tokChart.data.datasets[0].data = deltas(points.map(p => p.tokT));
  tokChart.data.datasets[1].data = deltas(points.map(p => p.tokI));
  tokChart.data.datasets[2].data = deltas(points.map(p => p.tokO));
  tokChart.update('none');
  reqChart.data.labels = labels;
  reqChart.data.datasets[0].data = deltas(points.map(p => p.reqCompleted));
  reqChart.data.datasets[1].data = deltas(points.map(p => p.reqErrors));
  reqChart.update('none');
}

// ── Tab handlers ──
function setupTabs() {
  for (const id of ['chart-tabs', 'chart-tabs-2']) {
    document.getElementById(id).addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      currentWindow = btn.dataset.w;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.w === currentWindow));
      fetchHistory();
    });
  }
}
async function fetchHistory() {
  try {
    const data = await fetchJson('/metrics/history?window=' + currentWindow);
    updateCharts(data.points || []);
  } catch {}
}

// ── Worker Card Renderer ──
function renderWorkerCard(name, traffic, router, tokenHealth, unified, activeConns) {
  const isLimited = router?.limited || false;
  const th = tokenHealth || {};
  const u = unified || {};
  const reqs = traffic?.requests || 0;
  const errs = traffic?.errors || 0;
  const active = activeConns || 0;
  const lastAgo = traffic?.lastReqAt ? fmt(Date.now() - traffic.lastReqAt) : 'never';

  // Token health
  const expiresMs = th.expiresInMs || 0;
  const expiresHuman = th.expiresInHuman || '-';
  const expColor = expiresMs > 7200000 ? 'g' : expiresMs > 1800000 ? 'y' : 'r';
  const expBarPct = th.expiresAt > 0 ? Math.min(100, Math.max(0, (expiresMs / 28800000) * 100)) : 0;
  const expBarColor = expiresMs > 7200000 ? 'var(--green)' : expiresMs > 1800000 ? 'var(--yellow)' : 'var(--red)';

  // Unified rate limits
  const d7Pct = Math.round((u.d7Utilization || 0) * 100);
  const h5Pct = Math.round((u.h5Utilization || 0) * 100);
  const d7Color = d7Pct > 80 ? 'var(--red)' : d7Pct > 50 ? 'var(--yellow)' : 'var(--green)';
  const h5Color = h5Pct > 80 ? 'var(--red)' : h5Pct > 50 ? 'var(--yellow)' : 'var(--green)';

  // Status
  let statusClass = 'healthy', statusText = 'healthy';
  if (isLimited) { statusClass = 'limited'; statusText = 'rate limited'; }
  else if (th.isRefreshing) { statusClass = 'refreshing'; statusText = 'refreshing'; }

  let html = `<div class="worker-card ${isLimited ? 'limited' : ''}">`;
  html += `<div class="wc-header"><span class="wc-name">Worker ${name}</span><span class="wc-status ${statusClass}">${statusText}</span></div>`;

  // Traffic
  html += `<div class="wc-row"><span class="k">requests</span><span class="val b">${reqs}</span></div>`;
  html += `<div class="wc-row"><span class="k">errors</span><span class="val ${errs > 0 ? 'r' : ''}">${errs}</span></div>`;
  html += `<div class="wc-row"><span class="k">active</span><span class="val ${active > 0 ? 'g' : ''}">${active}</span></div>`;
  html += `<div class="wc-row"><span class="k">last request</span><span class="val">${lastAgo}</span></div>`;

  // Token expiry
  html += '<hr class="wc-divider">';
  html += `<div class="wc-row"><span class="k">token expires</span><span class="val ${expColor}">${expiresHuman}</span></div>`;
  html += `<div class="bar-sm"><div class="fill" style="width:${expBarPct}%;background:${expBarColor}"></div></div>`;
  if (th.refreshCount > 0) {
    const lastRefresh = th.lastRefreshAt ? new Date(th.lastRefreshAt).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' }) : 'never';
    const icon = th.lastRefreshResult === 'success' ? '✅' : th.lastRefreshResult === 'error' ? '❌' : '—';
    html += `<div class="wc-row"><span class="k">last refresh</span><span class="val">${icon} ${lastRefresh} · ${th.refreshCount}×</span></div>`;
  }
  if (th.consecutiveErrors > 0) {
    html += `<div class="wc-row"><span class="k">refresh errors</span><span class="val r">${th.consecutiveErrors}</span></div>`;
  }

  // Unified limits (if data available)
  if (u.d7Utilization !== undefined) {
    html += '<hr class="wc-divider">';
    html += `<div class="wc-row"><span class="k">7d usage</span><span class="val" style="color:${d7Color}">${d7Pct}%</span></div>`;
    html += `<div class="bar-sm"><div class="fill" style="width:${d7Pct}%;background:${d7Color}"></div></div>`;
    html += `<div class="wc-row"><span class="k">5h usage</span><span class="val" style="color:${h5Color}">${h5Pct}%</span></div>`;
    html += `<div class="bar-sm"><div class="fill" style="width:${h5Pct}%;background:${h5Color}"></div></div>`;
  }

  // Rate limited info
  if (isLimited && router.limitedRemainingSec) {
    html += '<hr class="wc-divider">';
    html += `<div class="wc-row"><span class="k">cooldown</span><span class="val r">${router.limitedRemainingSec}s remaining</span></div>`;
  }

  html += '</div>';
  return html;
}

// ── Main Refresh ──
async function refresh() {
  try {
    const [metrics, zombies, eventsData, reaperData] = await Promise.all([
      fetchJson('/metrics'),
      fetchJson('/zombies'),
      fetchJson('/events?since_id=' + lastEventId + '&limit=100'),
      fetchJson('/system-reaper').catch(() => ({ stats: null })),
    ]);

    const cfg = metrics.config || {};
    const ws = metrics.workerStats || {};
    const ac = metrics.activeConnections || {};
    const tokenHealth = metrics.tokenRefreshStatus || {};
    const unified = metrics.unifiedRateLimits || {};

    // ── Header ──
    document.getElementById('version').textContent = 'v' + (cfg.version || '0.7.0');
    document.getElementById('status-dot').className = 'dot ok';
    document.getElementById('refresh-note').textContent = 'live · ' + fmt(Date.now() - startTime);
    const modeBadge = document.getElementById('mode-badge');
    modeBadge.textContent = cfg.useCliAgents ? 'CLI' : 'API Direct';
    document.getElementById('worker-count').textContent = (cfg.workerCount || 0) + ' workers';

    // ── Token Bar ──
    const tok = metrics.tokens || { totals: { input: 0, output: 0, total: 0, requests: 0 }, byModel: {} };
    const live = metrics.processes?.liveTokens || { input: 0, output: 0, total: 0 };
    const allProcsForLive = zombies.processes || [];
    const liveByModel = {};
    for (const p of allProcsForLive) {
      const li = p.liveInputTokens || 0, lo = p.liveOutputTokens || 0;
      if (li + lo > 0) {
        const prev = liveByModel[p.model] || { input: 0, output: 0, total: 0 };
        liveByModel[p.model] = { input: prev.input + li, output: prev.output + lo, total: prev.total + li + lo };
      }
    }
    const gi = tok.totals.input + live.input, go = tok.totals.output + live.output;
    let barHtml = `<div class="tok-cell total"><div class="tok-label"><span class="mdot" style="background:var(--blue)"></span>Total</div><div class="tok-val">${fmtTok(gi + go)}</div><div class="tok-sub">${fmtTok(gi)} in → ${fmtTok(go)} out · ${tok.totals.requests} req</div></div>`;
    for (const m of ['opus', 'sonnet', 'haiku']) {
      const c = tok.byModel[m], lm = liveByModel[m];
      const mi = (c?.input || 0) + (lm?.input || 0), mo = (c?.output || 0) + (lm?.output || 0);
      const mt = mi + mo, mr = c?.requests || 0;
      if (mt === 0 && !c) {
        barHtml += `<div class="tok-cell ${m}"><div class="tok-label"><span class="mdot" style="background:var(--${m})"></span>${m}</div><div class="tok-val" style="color:var(--text2)">—</div><div class="tok-sub">no requests</div></div>`;
      } else {
        const liveTag = lm && lm.total > 0 ? ` <span style="color:var(--orange)">(+${fmtTok(lm.total)})</span>` : '';
        barHtml += `<div class="tok-cell ${m}"><div class="tok-label"><span class="mdot" style="background:var(--${m})"></span>${m}</div><div class="tok-val">${fmtTok(mt)}</div><div class="tok-sub">${fmtTok(mi)}→${fmtTok(mo)} · ${mr} req${liveTag}</div></div>`;
      }
    }
    document.getElementById('tok-bar').innerHTML = barHtml;

    // ── Live Bar ──
    const procCount = metrics.processes?.total || 0;
    const liveBar = document.getElementById('live-bar');
    if (live.total > 0 || procCount > 0) {
      liveBar.style.display = 'flex';
      document.getElementById('live-label').textContent = live.total > 0 ? `${fmtTok(live.total)} tokens` : 'active';
      document.getElementById('live-detail').textContent = live.total > 0
        ? `${fmtTok(live.input)} in → ${fmtTok(live.output)} out · ${procCount} proc`
        : `${procCount} proc running`;
    } else {
      liveBar.style.display = 'none';
    }

    // ── Worker Cards ──
    const routers = metrics.cliRouters || [];
    const routerMap = Object.fromEntries(routers.map(r => [r.name, r]));
    // Get all worker names from traffic + routers (union)
    const allWorkerNames = [...new Set([
      ...Object.keys(ws.traffic || {}),
      ...routers.map(r => r.name),
    ])].sort();
    let workersHtml = '';
    for (const name of allWorkerNames) {
      workersHtml += renderWorkerCard(
        name,
        ws.traffic?.[name],
        routerMap[name],
        tokenHealth[name],
        unified[name],
        ac[name] || 0,
      );
    }
    if (allWorkerNames.length === 0) {
      workersHtml = '<div class="empty">no workers configured</div>';
    }
    document.getElementById('workers-grid').innerHTML = workersHtml;

    // ── Queue ──
    const q = metrics.queue;
    const qm = q.metrics;
    const sa = metrics.sessionAffinity || {};
    let qHtml = '';
    qHtml += `<div class="metric"><span class="lbl">active / max</span><span class="val" style="color:${q.active > 0 ? 'var(--blue)' : 'var(--green)'}">${q.active} / ${q.maxConcurrent}</span></div>`;
    qHtml += `<div class="metric"><span class="lbl">queued</span><span class="val" style="color:${q.totalQueued > 0 ? 'var(--yellow)' : ''}">${q.totalQueued}</span></div>`;
    qHtml += `<div class="metric"><span class="lbl">processed</span><span class="val">${qm.totalProcessed}</span></div>`;
    qHtml += `<div class="metric"><span class="lbl">timed out</span><span class="val" style="color:${qm.totalTimedOut > 0 ? 'var(--yellow)' : ''}">${qm.totalTimedOut}</span></div>`;
    qHtml += `<div class="metric"><span class="lbl">rejected</span><span class="val" style="color:${qm.totalRejected > 0 ? 'var(--red)' : ''}">${qm.totalRejected}</span></div>`;
    // Session affinity
    qHtml += '<hr class="divider">';
    qHtml += `<div class="sub-hd">Session Affinity</div>`;
    qHtml += `<div class="metric"><span class="lbl">hit rate</span><span class="val">${sa.hitRate || '0%'}</span></div>`;
    qHtml += `<div class="metric"><span class="lbl">sessions</span><span class="val">${sa.activeSessions || 0}</span></div>`;
    // Rate limits per model
    const ru = metrics.rateUsage;
    const rl = metrics.rateLimits;
    qHtml += '<hr class="divider">';
    qHtml += `<div class="sub-hd">Rate Limits</div>`;
    for (const model of ['opus', 'sonnet', 'haiku']) {
      const u = ru[model];
      if (!u) continue;
      const reqUsed = parseInt(u.requests) || 0;
      const reqMax = rl[model].requestsPerMin;
      const rp = pct(reqUsed, reqMax);
      qHtml += `<div class="rate-section">${modelTag(model)} <span style="font-size:10px;color:var(--text2)">${reqUsed}/${reqMax} req/m</span>`;
      qHtml += `<div class="rate-bar-wrap"><div class="rate-bg"><div class="rate-fill" style="width:${rp}%;background:${barColor(rp)}"></div></div></div></div>`;
    }
    document.getElementById('queue-body').innerHTML = qHtml;

    // ── Errors ──
    const totalErr = ws.errors ? Object.values(ws.errors).reduce((s, v) => s + v, 0) : 0;
    document.getElementById('err-total').textContent = totalErr > 0 ? totalErr : '';
    let eHtml = '';
    if (ws.errors) {
      const labels = { cli_crash: 'CLI Crash', cli_killed: 'CLI Killed', context_overflow: 'Ctx Overflow', api_error: 'API Error', stream_retry: 'Stream Retry', timeout: 'Timeout', queue_timeout: 'Queue Timeout', safety_refusal: 'Safety Refusal', auth_expired: 'Auth Expired', other: 'Other' };
      for (const [cat, count] of Object.entries(ws.errors)) {
        eHtml += `<div class="err-row"><span class="cat">${labels[cat] || cat}</span><span class="num ${count > 0 ? 'nz' : 'z'}">${count}</span></div>`;
      }
    }
    if (ws.recentErrors && ws.recentErrors.length > 0) {
      eHtml += '<hr class="divider">';
      eHtml += `<div class="sub-hd">Recent</div>`;
      eHtml += ws.recentErrors.slice().reverse().slice(0, 15).map(e => {
        const t = new Date(e.ts).toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        return `<div class="re"><span class="t">${t}</span><span class="w">W${e.worker}</span><span class="c">${e.category}</span><span class="d" title="${(e.detail || '').replace(/"/g, '&quot;')}">${e.detail || '-'}</span></div>`;
      }).join('');
    }
    if (!eHtml) eHtml = '<div class="empty">no errors</div>';
    document.getElementById('errors-body').innerHTML = eHtml;

    // ── Processes ──
    const allProcs = allProcsForLive;
    if (allProcs.length === 0) {
      document.getElementById('procs-table').innerHTML = '<div class="empty">no active processes</div>';
    } else {
      const rows = allProcs.map(p => {
        const age = fmt(Date.now() - p.spawnedAt);
        const idle = fmt(Date.now() - p.lastActivityAt);
        const li = p.liveInputTokens || 0, lo = p.liveOutputTokens || 0, lt = li + lo;
        const tokCell = lt > 0
          ? `<span style="color:var(--orange)">${fmtTok(li)}→${fmtTok(lo)}</span>`
          : '<span style="color:var(--text2)">-</span>';
        const wName = p.worker ? p.worker.split(':')[0] : '-';
        const wTag = `<span style="padding:1px 4px;border-radius:3px;font-size:9px;font-weight:600;background:rgba(88,166,255,0.15);color:var(--blue)">W${wName}</span>`;
        return `<tr><td>${p.pid}</td><td>${wTag}</td><td>${modeTag(p.mode)}</td><td>${modelTag(p.model)}</td><td>${tokCell}</td><td>${age}</td><td title="${p.source}">${p.source.length > 14 ? '…' + p.source.slice(-12) : p.source}</td></tr>`;
      }).join('');
      document.getElementById('procs-table').innerHTML = `<table><tr><th>PID</th><th>W</th><th>Mode</th><th>Model</th><th>Tokens</th><th>Age</th><th>Source</th></tr>${rows}</table>`;
    }

    // ── System Reaper ──
    const sr = reaperData?.stats || metrics?.systemReaper;
    if (sr) {
      document.getElementById('reaper-count').textContent = sr.totalKilled > 0 ? `${sr.totalKilled} killed` : '';
      let rHtml = '';
      rHtml += `<div class="metric"><span class="lbl">sweeps</span><span class="val">${sr.totalSweeps}</span></div>`;
      rHtml += `<div class="metric"><span class="lbl">total killed</span><span class="val" style="color:${sr.totalKilled > 0 ? 'var(--red)' : 'var(--green)'}">${sr.totalKilled}</span></div>`;
      if (sr.lastSweepAt) rHtml += `<div class="metric"><span class="lbl">last sweep</span><span class="val">${fmt(Date.now() - sr.lastSweepAt)} ago</span></div>`;
      const recent = sr.recentKills || [];
      if (recent.length > 0) {
        rHtml += '<hr class="divider">';
        for (const k of [...recent].reverse().slice(0, 10)) {
          const age = k.ageSec >= 3600 ? Math.round(k.ageSec / 3600) + 'h' : k.ageSec >= 60 ? Math.round(k.ageSec / 60) + 'm' : k.ageSec + 's';
          rHtml += `<div class="re"><span class="t">${age}</span><span class="w">${k.pid}</span><span class="c">${k.category}</span><span class="d">${(k.command || '').slice(0, 60)}</span></div>`;
        }
      }
      document.getElementById('reaper-body').innerHTML = rHtml;
    }

    // ── Events ──
    if (eventsData.events && eventsData.events.length > 0) {
      const container = document.getElementById('events-body');
      for (const ev of eventsData.events) {
        if (ev.id > lastEventId) lastEventId = ev.id;
        const row = document.createElement('div');
        row.className = 'ev';
        let tokHtml = '';
        const inTok = ev.inputTokens || 0, outTok = ev.outputTokens || 0;
        if (inTok > 0 || outTok > 0) tokHtml = `${fmtTok(inTok)}→${fmtTok(outTok)}`;
        const skipKeys = new Set(['id', 'type', 'ts', 'isoTs', 'inputTokens', 'outputTokens']);
        const detail = Object.entries(ev).filter(([k]) => !skipKeys.has(k)).map(([k, v]) => {
          const s = String(v); return `${k}=${s.length > 25 ? s.slice(0, 23) + '…' : s}`;
        }).join(' ');
        row.innerHTML = `<span class="t">${shortTime(ev.isoTs)}</span><span class="tp ${ev.type}">${ev.type}</span><span class="tok">${tokHtml}</span><span class="det">${detail}</span>`;
        container.prepend(row);
      }
      while (container.children.length > 150) container.removeChild(container.lastChild);
    }

  } catch (err) {
    document.getElementById('status-dot').className = 'dot err';
    document.getElementById('refresh-note').textContent = 'error: ' + err.message;
  }
}

// ── SSE Live Stream ──
const activeStreams = new Map();
function initSSE() {
  const es = new EventSource(BASE + '/stream');
  const dot = document.getElementById('sse-dot');

  es.addEventListener('connected', () => { dot.classList.add('connected'); });

  es.addEventListener('request', (e) => {
    const d = JSON.parse(e.data);
    const isStream = d.mode === 'stream' || d.mode === 'stream_tools';
    const isSync = d.mode === 'sync_tools';
    if (!isStream && !isSync) return;
    const feeds = document.getElementById('stream-feeds');
    const placeholder = feeds.querySelector('.empty');
    if (placeholder) placeholder.remove();
    const displayMode = isSync ? 'sync' : 'stream';
    const item = document.createElement('div');
    item.className = 'stream-item';
    item.id = 'stream-' + d.reqId;
    const wBadge = d.worker ? `<span style="padding:1px 4px;border-radius:3px;font-size:9px;font-weight:600;background:rgba(88,166,255,0.15);color:var(--blue)">W${d.worker}</span>` : '';
    item.innerHTML = `<div class="si-hd">${wBadge} ${modelTag(d.model)} ${modeTag(displayMode)} <span class="sid">${d.reqId.slice(-8)}</span><span class="stok" id="stok-${d.reqId}">${isSync ? 'waiting...' : '0'}</span></div><div class="si-body" id="sbody-${d.reqId}">${isSync ? '<span style="color:var(--text2)">sync...</span>' : '<span class="cursor"></span>'}</div>`;
    feeds.prepend(item);
    activeStreams.set(d.reqId, { el: item, text: '', isSync });
    while (feeds.children.length > 5) feeds.removeChild(feeds.lastChild);
  });

  es.addEventListener('chunk', (e) => {
    const d = JSON.parse(e.data);
    const stream = activeStreams.get(d.reqId);
    if (!stream) return;
    stream.text += d.text;
    const body = document.getElementById('sbody-' + d.reqId);
    if (body) {
      const display = stream.text.length > 400 ? '…' + stream.text.slice(-400) : stream.text;
      body.innerHTML = display.replace(/</g, '&lt;') + '<span class="cursor"></span>';
      body.scrollTop = body.scrollHeight;
    }
    const tokEl = document.getElementById('stok-' + d.reqId);
    if (tokEl) tokEl.textContent = fmtTok(d.tokens);
  });

  es.addEventListener('complete', (e) => {
    const d = JSON.parse(e.data);
    const stream = activeStreams.get(d.reqId);
    if (!stream) return;
    const body = document.getElementById('sbody-' + d.reqId);
    if (body) { const c = body.querySelector('.cursor'); if (c) c.remove(); }
    const tokEl = document.getElementById('stok-' + d.reqId);
    if (tokEl) tokEl.innerHTML = `<span style="color:var(--green)">✓</span> ${fmtTok(d.inputTokens)}→${fmtTok(d.outputTokens)}`;
    setTimeout(() => { const el = document.getElementById('stream-' + d.reqId); if (el) el.style.opacity = '0.4'; }, 30000);
    activeStreams.delete(d.reqId);
  });

  es.addEventListener('system_reap', (e) => {
    const d = JSON.parse(e.data);
    const feeds = document.getElementById('stream-feeds');
    const placeholder = feeds.querySelector('.empty');
    if (placeholder) placeholder.remove();
    const item = document.createElement('div');
    item.className = 'stream-item';
    item.innerHTML = `<div class="si-hd"><span style="color:var(--red);font-weight:600">🧟 REAP</span> <span class="sid">${d.category}</span></div><div class="si-body" style="color:var(--red)">Killed PID ${d.pid} (${d.ageSec}s)</div>`;
    feeds.prepend(item);
    while (feeds.children.length > 5) feeds.removeChild(feeds.lastChild);
  });

  es.onerror = () => { dot.classList.remove('connected'); };
}

// ── Init ──
initCharts();
setupTabs();
initSSE();
refresh();
fetchHistory();
setInterval(refresh, 2000);
setInterval(fetchHistory, 10000);
